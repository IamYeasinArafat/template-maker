<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Template v2</title>
    <style>
        .container{
            width: 1080px;
            height: 1440px;

            font-family: 'Playfair Display', serif;

            display: flex;
            flex-direction: column;

            background-color: red;
            color: white;
            
            padding: 10px; 
            box-sizing: border-box;
        }


        .post{
            border: 2px solid black;
        
            padding: 20px;
            flex: 1;

            display: flex;
            flex-direction: column;
        }

        .header{
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }

        .full-name{
            font-size: 5rem;

            width: 600px;
            text-transform: capitalize;
        }

        .handle{
            font-size: 2rem;

            width: 400px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="post">
            <div class="header">
                <h1 class="full-name">Yeasin Arafat Rafio</h1>
                <p class="handle">@yeasin.arafat.rafio</p>
            </div>
        </div>
    </div>

</body>
</html>
