<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Student Profile Template</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="insta-card" style="background-image: url('data:image/png;base64,{{ bg_image_data }}');">
        <header class="card-header">
            <div class="name-block">
                <h1>{{ name }}</h1>
            </div>
            <div class="handle">
                {{ handle }}
            </div>
        </header>

        <div class="image-container">
            <img src="data:image/png;base64,{{ profile_image_data }}" alt="Profile Portrait">
            <p class="major">{{ major }}</p>
        </div>

        <footer class="card-footer">
            <div class="location">
                <svg viewBox="0 0 24 24" fill="currentColor" width="40" height="40">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                {{ location }}
            </div>

            <div class="university-logo">
                <img src="data:image/png;base64,{{ seal_image_data }}" alt="University Seal">
            </div>
        </footer>
    </div>

</body>
</html>
